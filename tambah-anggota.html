<script>
        // 1. Ambil ID dari alamat URL (?id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const idAnggotaUrl = urlParams.get('id');

        // 2. Fungsi Ambil Data dari Storage (Helper)
        function ambilDataLokal() {
            try {
                const raw = localStorage.getItem('dataCloud');
                return raw ? JSON.parse(raw) : { keluarga: [] };
            } catch (e) {
                console.error("Gagal ambil data lokal", e);
                return { keluarga: [] };
            }
        }

        // 3. FUNGSI LENGKAP (Mode Edit)
        function muatDataUntukEdit(id) {
            const dataFull = ambilDataLokal();
            if (!dataFull.keluarga) return;

            const data = dataFull.keluarga.find(a => String(a.id) === String(id));

            if (data) {
                console.log("Memuat data edit untuk:", data.nama);
                
                // Fungsi pembantu agar tidak error jika ID HTML tidak ada
                const isiInput = (idHtml, nilai) => {
                    const el = document.getElementById(idHtml);
                    if (el) el.value = nilai || "";
                };

                isiInput('namaLengkap', data.nama);
                isiInput('domisili', data.domisili);
                isiInput('tempatLahir', data.tempatLahir);
                isiInput('tanggalLahir', data.tanggalLahir);
                isiInput('parentID', data.parentID);
                isiInput('idPasangan', data.idPasangan);
                
                // Logika Status & Relasi
                const sSelect = document.getElementById('statusSelect');
                const gRelasi = document.getElementById('groupRelasi');
                if (sSelect) {
                    sSelect.value = data.status || "none";
                    if (gRelasi) {
                        gRelasi.classList.toggle('hidden', data.status !== 'anak');
                    }
                }

                // Cari Nama Orang Tua berdasarkan ID
                if (data.parentID) {
                    const ortu = dataFull.keluarga.find(o => String(o.id) === String(data.parentID));
                    const inCariParent = document.getElementById('inputCariParent');
                    if (ortu && inCariParent) inCariParent.value = ortu.nama;
                }
                
                // Cari Nama Pasangan berdasarkan ID
                if (data.idPasangan) {
                    const pasangan = dataFull.keluarga.find(o => String(o.id) === String(data.idPasangan));
                    const inCariPasangan = document.getElementById('inputCariPasangan');
                    if (pasangan && inCariPasangan) inCariPasangan.value = pasangan.nama;
                }

                // Tampilkan Foto
                if (data.foto && data.foto.startsWith('data:image')) {
                    const pImg = document.getElementById('previewImage');
                    const dIcon = document.getElementById('defaultIcon');
                    if(pImg && dIcon) {
                        pImg.src = data.foto;
                        pImg.classList.remove('hidden');
                        dIcon.classList.add('hidden');
                    }
                }

                // Ganti judul halaman
                const h1 = document.querySelector('.header-curve h1');
                if(h1) h1.innerText = "Edit Anggota";
            }
        }

        // 4. JALANKAN SAAT HALAMAN DIBUKA
        document.addEventListener('DOMContentLoaded', () => {
            if (idAnggotaUrl) {
                muatDataUntukEdit(idAnggotaUrl);
            }

            // Fitur Kapitalisasi Otomatis
            const inNama = document.getElementById('namaLengkap');
            const inAlamat = document.getElementById('domisili');
            [inNama, inAlamat].forEach(input => {
                if (input) {
                    input.addEventListener('input', function() {
                        const start = this.selectionStart;
                        this.value = buatKapital(this.value);
                        this.setSelectionRange(start, start);
                    });
                }
            });
        });

        // 5. Fungsi Kapitalisasi
        function buatKapital(str) {
            if (!str) return "";
            let hasil = str.replace(/\b\w/g, char => char.toUpperCase());
            const singkatan = ["Rt", "Rw", "Diy", "Ii", "Iii", "Iv", "Vi", "Vii", "Viii", "Ix", "Xi", "Xii"];
            singkatan.forEach(k => {
                const reg = new RegExp("\\b" + k + "\\b", "gi");
                hasil = hasil.replace(reg, k.toUpperCase());
            });
            return hasil;
        }

        // 6. Tombol Kembali
        const btnB = document.getElementById('btnBack');
        if (btnB) {
            btnB.addEventListener('click', () => {
                window.location.href = idAnggotaUrl ? 'cari-anggota.html' : 'index.html';
            });
        }

        // 7. Logika Upload Foto
        const fAnggota = document.getElementById('fotoAnggota');
        if (fAnggota) {
            fAnggota.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            let w = 300; let h = (img.height / img.width) * w;
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            const b64 = canvas.toDataURL('image/jpeg', 0.7);
                            const pImg = document.getElementById('previewImage');
                            const dIcon = document.getElementById('defaultIcon');
                            if(pImg && dIcon) {
                                pImg.src = b64;
                                pImg.classList.remove('hidden');
                                dIcon.classList.add('hidden');
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
    </script>
