<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute;
            left: 15px;
            top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
        }
        /* Style Dropdown Saran */
        #listSaranNama {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .saran-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="px-6 mt-6 relative">
        <div class="relative">
            <input type="text" id="searchInput" oninput="filterAnggota()" 
                   placeholder="Ketik nama keluarga..." 
                   class="w-full bg-white border-2 border-gray-100 rounded-2xl py-4 px-6 shadow-sm focus:outline-none focus:border-[#00e5ff] transition-all"
                   autocomplete="off">
            
            <div id="listSaranNama" class="absolute left-0 right-0 top-[110%] bg-white border border-gray-100 rounded-2xl z-50 max-h-60 overflow-y-auto hidden">
                <div id="kontenSaran"></div>
            </div>
        </div>
    </div>

    <div class="px-6 mt-8 flex justify-between items-center">
        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Daftar Keluarga</h2>
        <span id="jumlahData" class="text-[10px] bg-cyan-100 text-cyan-600 px-2 py-1 rounded-full font-bold">0 Anggota</span>
    </div>

    <div id="wadahDaftar" class="p-6">
        </div>

    <script src="config.js"></script>
    <script>
        // 1. Ambil Data Lokal
        function getDaftarDariStorage() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (dataRaw) {
                const parsed = JSON.parse(dataRaw);
                return parsed.keluarga || []; 
            }
            return [];
        }

        // 2. Fungsi Filter & Saran Otomatis
        function filterAnggota() {
            const input = document.getElementById('searchInput');
            const listSaran = document.getElementById('listSaranNama');
            const kontenSaran = document.getElementById('kontenSaran');
            const kataKunci = input.value.toLowerCase().trim();
            
            const daftarKeluarga = getDaftarDariStorage();

            // Jika input kosong, sembunyikan saran dan tampilkan semua kartu
            if (kataKunci.length === 0) {
                listSaran.classList.add('hidden');
                renderData(daftarKeluarga);
                return;
            }

            // Filter data yang cocok
            const hasilFilter = daftarKeluarga.filter(a => 
                (a.nama || "").toLowerCase().includes(kataKunci) ||
                (a.domisili || "").toLowerCase().includes(kataKunci)
            );

            // TAMPILKAN DROPDOWN SARAN (Hanya jika ada hasil)
            if (hasilFilter.length > 0 && kataKunci.length >= 2) {
                listSaran.classList.remove('hidden');
                kontenSaran.innerHTML = hasilFilter.slice(0, 10).map(a => `
                    <div class="saran-item p-4 hover:bg-cyan-50 cursor-pointer border-b border-gray-50 flex items-center transition-colors"
                         onclick="pilihAnggota('${a.id}')">
                        <div class="w-8 h-8 rounded-full bg-cyan-100 flex items-center justify-center mr-3">
                            <i class="fas fa-user text-cyan-500 text-xs"></i>
                        </div>
                        <div>
                            <div class="text-sm font-bold text-gray-700">${a.nama}</div>
                            <div class="text-[10px] text-gray-400">${a.domisili || 'Lokasi belum diisi'}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                listSaran.classList.add('hidden');
            }

            // Tetap update daftar kartu di bawah agar sinkron
            renderData(hasilFilter);
        }

        // 3. Fungsi Saat Saran diklik
        function pilihAnggota(id) {
            window.location.href = `tambah-anggota.html?id=${id}`;
        }

        // 4. Fungsi Render Kartu
        function renderData(data) {
            const wadah = document.getElementById('wadahDaftar');
            const jumlahEl = document.getElementById('jumlahData');
            
            jumlahEl.innerText = `${data.length} Anggota`;

            if (data.length === 0) {
                wadah.innerHTML = `
                    <div class="text-center py-12">
                        <i class="fas fa-search text-gray-200 text-5xl mb-4"></i>
                        <p class="text-gray-400 italic">Nama tidak ditemukan...</p>
                    </div>`;
                return;
            }

            // Urutkan Abjad
            const dataTerurut = [...data].sort((a, b) => (a.nama || "").localeCompare(b.nama || ""));

            wadah.innerHTML = dataTerurut.map(anggota => {
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(anggota.nama)}&background=00e5ff&color=fff`;
                }

                let infoLahir = (anggota.tempatLahir || anggota.tanggalLahir) 
                    ? `${anggota.tempatLahir || '?'}, ${anggota.tanggalLahir || '?'}`
                    : "Data kelahiran belum diisi";

                return `
                    <div class="flex items-center p-4 bg-white mb-4 rounded-3xl border border-gray-100 shadow-sm active:scale-95 transition-all" 
                         onclick="pilihAnggota('${anggota.id}')">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-2xl object-cover border-2 border-cyan-50 shadow-sm mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${anggota.nama}</h4>
                            <p class="text-[10px] text-cyan-500 font-bold mt-1 uppercase tracking-wider">${infoLahir}</p>
                            <p class="text-[11px] text-gray-400 mt-1 flex items-center">
                                <i class="fas fa-map-marker-alt mr-1 text-gray-300"></i> ${anggota.domisili || 'Lokasi belum diisi'}
                            </p>
                        </div>
                        <div class="text-gray-200"><i class="fas fa-chevron-right"></i></div>
                    </div>`;
            }).join('');
        }

        // Jalankan saat pertama buka
        window.onload = () => {
            renderData(getDaftarDariStorage());
        };

        // Klik di luar saran untuk menutup dropdown
        document.addEventListener('click', (e) => {
            if (!document.getElementById('searchInput').contains(e.target)) {
                document.getElementById('listSaranNama').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
