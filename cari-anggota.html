<!DOCTYPE html>
<html lang="id">
<head>
    <title>Cari Anggota - Silsilah Mbah Muntari</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4RDDKDQNKB"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-4RDDKDQNKB');
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .header-curve {
            background: linear-gradient(135deg, #00e5ff 0%, #00acc1 100%);
            height: 90px;
            border-bottom-left-radius: 10% 30px;
            border-bottom-right-radius: 10% 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .btn-back {
            position: absolute; left: 15px; top: 35px;
            background: rgba(39, 38, 38, 0.2);
            border-radius: 50%; width: 35px; height: 35px;
            display: flex; align-items: center; justify-content: center;
            color: white; text-decoration: none; font-weight: bold;
        }
        .search-input {
            width: 100%; padding: 12px 20px; border-radius: 25px;
            border: 1px solid #e0e0e0; outline: none; transition: 0.3s;
        }
        .search-input:focus { border-color: #00e5ff; box-shadow: 0 0 10px rgba(0,229,255,0.1); }
        .member-card {
            display: flex; align-items: center; padding: 12px;
            background: white; border-radius: 15px; margin-bottom: 12px;
            border: 1px solid #f0f0f0; transition: transform 0.2s;
        }
        .member-card:active { transform: scale(0.98); background-color: #f9f9f9; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <div class="header-curve">
        <button onclick="window.location.href='index.html'" class="btn-back">←</button>
        <h1 class="text-xl font-bold">Cari Anggota</h1>
    </div>

    <div class="mt-5 px-6">
        <input type="text" id="searchInput" oninput="filterAnggota()" placeholder="Ketik nama (Agus, Andi, dll)..." class="search-input">
    </div>

    <div id="wadahDaftar" class="p-6 mt-2">
        </div>

    <script src="config.js"></script> 
    <script>
        // 1. Fungsi ambil data paling aman
        function getDaftarData() {
            const dataRaw = localStorage.getItem('dataCloud');
            if (!dataRaw) return [];
            try {
                const parsed = JSON.parse(dataRaw);
                // Cek apakah data ada di dalam 'keluarga' atau langsung di root array
                return parsed.keluarga || (Array.isArray(parsed) ? parsed : []);
            } catch (e) {
                return [];
            }
        }

        // 2. Fungsi Render (Ditambahkan proteksi input kosong)
        function renderData(data, sedangMencari = false) {
            const wadahDaftar = document.getElementById('wadahDaftar');
            const inputKetik = document.getElementById('searchInput').value.trim();

            // Jika sedang tidak mencari dan data benar-benar tidak ada
            if (!sedangMencari && (!data || data.length === 0)) {
                wadahDaftar.innerHTML = `
                    <div class="text-center mt-12 px-6">
                        <p class="text-gray-400">Data tidak tersedia. Silakan tekan tombol sinkron.</p>
                        <button onclick="muatDaftarAnggota(true)" class="bg-cyan-500 text-white px-6 py-2 rounded-full mt-4">Sinkron Data</button>
                    </div>`;
                return;
            }

            // Jika hasil pencarian nihil
            if (sedangMencari && (!data || data.length === 0)) {
                wadahDaftar.innerHTML = `<p class="text-center text-gray-400 mt-10">Nama "${inputKetik}" tidak ditemukan.</p>`;
                return;
            }

            wadahDaftar.innerHTML = ''; 
            // Sortir nama (proteksi Case Sensitive)
            const dataTerurut = [...data].sort((a, b) => {
                const nA = (a.nama || a.Nama || "").toString().toLowerCase();
                const nB = (b.nama || b.Nama || "").toString().toLowerCase();
                return nA.localeCompare(nB);
            });

            dataTerurut.forEach(anggota => {
                // SAKTI: Ambil nama dari berbagai kemungkinan kolom
                const namaFinal = anggota.nama || anggota.Nama || anggota.nama_lengkap || "Tanpa Nama";
                const domisiliFinal = anggota.domisili || anggota.Domisili || "Lokasi tidak diisi";
                
                let sumberFoto = anggota.foto;
                if (!sumberFoto || sumberFoto.length < 20) {
                    sumberFoto = `https://ui-avatars.com/api/?name=${encodeURIComponent(namaFinal)}&background=00e5ff&color=fff`;
                }

                wadahDaftar.innerHTML += `
                    <div class="member-card shadow-sm cursor-pointer" onclick="window.location.href='tambah-anggota.html?id=${anggota.id}'">
                        <img src="${sumberFoto}" class="w-14 h-14 rounded-full object-cover border-2 border-[#00e5ff] mr-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-gray-800 text-md leading-tight">${namaFinal}</h4>
                            <p class="text-xs text-gray-400 mt-1 italic">📍 ${domisiliFinal}</p>
                        </div>
                        <div class="text-gray-300 ml-2">❯</div>
                    </div>`;
            });
        }

        // 3. Fungsi Filter (Dibuat sangat teliti)
        function filterAnggota() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const dataLengkap = getDaftarData();
            
            // Balikkan ke daftar awal jika input dihapus
            if (input === "") {
                renderData(dataLengkap, false);
                return;
            }

            const hasilFilter = dataLengkap.filter(a => {
                const nama = (a.nama || a.Nama || a.nama_lengkap || "").toString().toLowerCase();
                const domisili = (a.domisili || a.Domisili || "").toString().toLowerCase();
                return nama.includes(input) || domisili.includes(input);
            });

            renderData(hasilFilter, true);
        }

        // 4. Muat Data dengan opsi Paksa Sinkron
        async function muatDaftarAnggota(paksa = false) {
            let daftar = getDaftarData();
            
            if (daftar.length === 0 || paksa) {
                document.getElementById('wadahDaftar').innerHTML = `<p class="text-center text-gray-400 animate-pulse mt-10">Mengambil data terbaru...</p>`;
                await sinkronisasiDataCloud();
                daftar = getDaftarData();
            }
            renderData(daftar, false);
        }

        async function sinkronisasiDataCloud() {
            try {
                const response = await fetch(URL_API + "?t=" + Date.now());
                const resJson = await response.json();
                if (resJson && resJson.keluarga) {
                    localStorage.setItem('dataCloud', JSON.stringify(resJson));
                }
            } catch (err) { console.error("Gagal tarik data:", err); }
        }

        window.onload = () => muatDaftarAnggota();
    </script>
</body>
</html>
